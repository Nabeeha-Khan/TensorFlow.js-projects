<!--
    This web application takes images from local files, uses coco-ssd which is a pretrained model
    provided by TensorFlow to detect objects from the 90 classes in coco-ssd, and then display the result
    in the form of bounding boxes around detected object with class name and prediction score
-->


<!DOCTYPE html>
<html>
    <!-- Load TensorFlow.js. This is required to use coco-ssd model. -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"> </script>
    <!-- Load the coco-ssd model. -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"> </script>
    <head>
        <title>Object Detection</title>
    </head>
    <style>
        .container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            text-align: center;
            width: 700px;
        }
        h1 {
            color: #6a4c93;
            font-size: 2.5rem;
            margin-bottom: 20px;
        }
        .upload-btn {
            display: inline-block;
            background: #6a4c93;
            color: white;
            padding: 12px 24px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }
        .upload-btn:hover {
            transform: scale(1.05);
        }
        canvas {
            margin-top: 20px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
    </style>
    <body>
        <div>
            <h1>AI Object Detection</h1>
            <label for="imageUpload" class="upload-btn"> Upload Image</label>
            <input type="file" id="imageUpload" accept="image/*" style="display: none;">
            <img id="preview" style="display: none;">
            <canvas id="myCanvas" width="200" height="100" style="border:1px solid #000000;">
            </canvas>
        </div>
        <script>
            document.getElementById("imageUpload").addEventListener("change", (event) => {
                const file = event.target.files[0];

                if (file) {
                    const img = document.getElementById("preview");
                    //Adding image to canvas
                    const c = document.getElementById("myCanvas");
                    const ctx = c.getContext("2d");
                    img.onload = () => {
                        c.width = img.naturalWidth;
                        c.height = img.naturalHeight;

                        ctx.drawImage(img, 0, 0);
                    };
                    img.src = URL.createObjectURL(file);
                    cocoSsd.load().then(model => {
                        model.detect(img).then(predictions => {
                            predictions.forEach(prediction => {
                                ctx.beginPath();
                                ctx.rect(...prediction.bbox);
                                ctx.lineWidth = 2;
                                ctx.strokeStyle = 'red';
                                ctx.fillStyle = 'red';
                                ctx.stroke();

                                ctx.fillStyle = "#6a4c93";
                                ctx.fillRect(x, y - 25, 120, 25);

                                ctx.fillStyle = "white";
                                ctx.fillText(
                                    `${prediction.class}`,
                                    x + 5,
                                    y - 8
                                );
                            });
                        });
                    });
                }
            });
        </script>
    </body>
</html>
